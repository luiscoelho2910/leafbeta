<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>FocusLeaf</title>
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="FocusLeaf" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <style>
    :root{
      --bg:#09090b;
      --card:#18181b;
      --card2:#202023;
      --card3:#111113;
      --line:rgba(255,255,255,.10);
      --text:#fafafa;
      --muted:#a1a1aa;
      --muted2:#71717a;
      --accent:#86efac;
      --accent2:#34d399;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      overflow-x:hidden;
    }
    button,input{font:inherit}
    button{cursor:pointer}
    header{
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(9,9,11,.94);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(14px);
    }
    .top{
      width:100%;
      max-width:620px;
      margin:0 auto;
      padding:14px 16px 16px;
    }
    .brand{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:14px;
    }
    .logo{
      width:54px;
      height:54px;
      border-radius:18px;
      background:var(--accent);
      display:grid;
      place-items:center;
      color:#052e16;
      font-size:27px;
      font-weight:900;
      flex:0 0 auto;
    }
    h1{font-size:23px;margin:0;letter-spacing:.2px}
    .brand p{margin:3px 0 0;color:var(--muted);font-size:13px;line-height:1.25}
    nav{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:5px;
      background:#27272a;
      padding:5px;
      border-radius:18px;
    }
    nav button{
      border:0;
      border-radius:14px;
      background:transparent;
      color:var(--muted);
      font-weight:850;
      padding:11px 8px;
    }
    nav button.active{background:var(--accent);color:#052e16}
    main{
      width:100%;
      max-width:620px;
      margin:0 auto;
      padding:22px 16px 34px;
      display:flex;
      flex-direction:column;
      gap:22px;
    }
    .hidden{display:none!important}
    .card,.hero{
      width:100%;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      padding:22px;
      box-shadow:0 16px 42px rgba(0,0,0,.20);
      overflow:hidden;
    }
    .hero{
      display:flex;
      flex-direction:column;
      gap:20px;
    }
    .eyebrow{
      color:var(--accent);
      font-size:14px;
      font-weight:900;
      margin-bottom:8px;
    }
    .hero h2,.title{
      margin:0;
      font-size:34px;
      line-height:1.05;
      letter-spacing:-.8px;
      font-weight:950;
    }
    .subtitle{
      color:var(--muted);
      font-size:15px;
      line-height:1.55;
      margin:10px 0 0;
    }
    .stats3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:11px;
    }
    .statBox{
      min-width:0;
      text-align:center;
      background:rgba(255,255,255,.045);
      border-radius:20px;
      padding:15px 8px;
    }
    .statBox b{font-size:20px;display:block}
    .statBox span{font-size:12px;color:var(--muted2)}
    .sectionHead{
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:flex-start;
      margin-bottom:18px;
    }
    .sectionHead h3,.card h3{
      margin:0;
      font-size:21px;
      font-weight:900;
    }
    .smallText{color:var(--muted);font-size:14px;line-height:1.45;margin:6px 0 0}
    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:var(--accent);
      color:#052e16;
      font-weight:950;
      border-radius:999px;
      padding:8px 14px;
      min-width:max-content;
      white-space:nowrap;
    }
    .progressOuter{
      height:13px;
      border-radius:999px;
      background:#27272a;
      overflow:hidden;
      margin-top:18px;
    }
    .progressInner{
      height:13px;
      border-radius:999px;
      background:var(--accent);
      transition:.2s ease;
    }
    .stepper{
      display:grid;
      grid-template-columns:64px 1fr 64px;
      gap:12px;
      align-items:center;
      margin:18px 0 12px;
    }
    .stepBtn{
      height:64px;
      border-radius:22px;
      border:1px solid var(--line);
      background:#27272a;
      color:var(--text);
      font-size:34px;
      font-weight:900;
      display:grid;
      place-items:center;
    }
    .stepBtn:active{transform:scale(.96)}
    .valueDisplay{
      min-height:64px;
      border-radius:22px;
      background:var(--accent);
      color:#052e16;
      font-weight:950;
      font-size:24px;
      display:grid;
      place-items:center;
      text-align:center;
      padding:8px;
    }
    .presets{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin-top:10px;
    }
    .preset{
      border:1px solid var(--line);
      background:#27272a;
      color:#d4d4d8;
      border-radius:15px;
      padding:10px 6px;
      font-size:13px;
      font-weight:850;
    }
    .preset.active{
      background:rgba(134,239,172,.14);
      border-color:rgba(134,239,172,.65);
      color:var(--accent);
    }
    .timerCircle{
      width:260px;
      height:260px;
      position:relative;
      margin:8px auto 22px;
    }
    .timerCircle svg{transform:rotate(-90deg)}
    .timerCenter{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      text-align:center;
    }
    .leafBubble{
      width:62px;
      height:62px;
      border-radius:999px;
      background:rgba(134,239,172,.12);
      display:grid;
      place-items:center;
      font-size:30px;
      margin:0 auto 11px;
    }
    .time{
      font-size:43px;
      font-weight:950;
      letter-spacing:-1px;
    }
    .sub{font-size:13px;color:var(--muted)}
    .modeTabs{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:5px;
      background:#27272a;
      border-radius:18px;
      padding:5px;
      margin:18px 0 20px;
    }
    .modeTabs button{
      border:0;
      border-radius:14px;
      padding:13px 10px;
      background:transparent;
      color:var(--muted);
      font-weight:850;
    }
    .modeTabs button.active{background:var(--accent);color:#052e16}
    .actions{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:18px;
    }
    .btn{
      border:0;
      border-radius:16px;
      padding:14px 12px;
      font-weight:900;
    }
    .primary{background:var(--accent);color:#052e16}
    .ghost{background:#27272a;color:#f4f4f5;border:1px solid var(--line)}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .notice{
      margin-top:18px;
      background:var(--card3);
      border:1px solid var(--line);
      color:var(--muted);
      border-radius:20px;
      padding:14px;
      font-size:14px;
      line-height:1.5;
    }
    .okmsg{
      background:rgba(134,239,172,.10);
      border:1px solid rgba(134,239,172,.22);
      color:#bbf7d0;
      border-radius:20px;
      padding:14px;
      font-weight:850;
      margin-bottom:16px;
    }
    .rangeTabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:5px;
      background:#27272a;
      border-radius:18px;
      padding:5px;
      margin-top:18px;
    }
    .rangeTabs button{
      border:0;
      border-radius:14px;
      padding:12px 8px;
      background:transparent;
      color:var(--muted);
      font-weight:850;
    }
    .rangeTabs button.active{background:var(--accent);color:#052e16}
    .statGrid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      margin-top:18px;
    }
    .metric{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      padding:18px;
    }
    .metric span{display:block;color:var(--muted);font-size:14px}
    .metric b{display:block;font-size:28px;margin-top:6px}
    .chart{
      display:flex;
      gap:10px;
      align-items:end;
      height:240px;
      padding:12px 2px 0;
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
    }
    .barDay{
      min-width:54px;
      flex:0 0 54px;
      border:0;
      background:transparent;
      color:inherit;
      padding:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
    }
    .range-day .barDay{min-width:100%;flex-basis:100%}
    .range-week .barDay{min-width:62px;flex-basis:62px}
    .range-month .barDay{min-width:42px;flex-basis:42px}
    .barShell{
      width:100%;
      height:165px;
      background:#27272a;
      border-radius:18px;
      display:flex;
      align-items:end;
      padding:5px;
    }
    .barFill{
      width:100%;
      min-height:6px;
      border-radius:14px;
      background:#52525b;
    }
    .barDay.selected .barShell{
      outline:2px solid var(--accent);
      background:rgba(134,239,172,.10);
    }
    .barDay.selected .barFill{background:var(--accent)}
    .barDay strong{font-size:12px;color:#d4d4d8}
    .barDay small{font-size:10px;color:var(--muted2)}
    .heat{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin-top:18px;
    }
    .heatItem{text-align:center}
    .heatCell{
      height:42px;
      border-radius:12px;
      border:1px solid rgba(134,239,172,.08);
      margin-bottom:4px;
    }
    .heatItem small{font-size:10px;color:var(--muted2)}
    .form{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:15px;
    }
    input{
      width:100%;
      min-width:0;
      background:#09090b;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:15px;
      padding:13px;
    }
    .session{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      background:var(--card3);
      border:1px solid var(--line);
      border-radius:18px;
      padding:13px;
      margin-top:10px;
    }
    .session b{display:block}
    .session p{margin:2px 0 0;color:var(--muted);font-size:12px}
    .profileHero{
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .avatar{
      width:96px;
      height:96px;
      border-radius:26px;
      background:var(--accent);
      color:#052e16;
      display:grid;
      place-items:center;
      font-size:48px;
      font-weight:950;
    }
    .profileStats{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-top:16px;
    }
    .profileStats div{
      background:var(--card2);
      border:1px solid var(--line);
      border-radius:20px;
      padding:14px;
    }
    .profileStats b{display:block;font-size:22px}
    .profileStats span{font-size:13px;color:var(--muted)}
    .records{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }
    @media(min-width:720px){
      .statGrid{grid-template-columns:repeat(2,1fr)}
      .profileStats{grid-template-columns:repeat(3,1fr)}
      .records{grid-template-columns:repeat(2,1fr)}
      .form{grid-template-columns:1fr 1fr 1fr auto}
      .heat{grid-template-columns:repeat(6,1fr)}
    }
  </style>
</head>
<body>
<header>
  <div class="top">
    <div class="brand">
      <div class="logo">🍃</div>
      <div>
        <h1>FocusLeaf</h1>
        <p>Study timer that stops when you leave the app.</p>
      </div>
    </div>
    <nav>
      <button data-tab="timer" class="active">Timer</button>
      <button data-tab="stats">Statistics</button>
      <button data-tab="profile">Profile</button>
    </nav>
  </div>
</header>

<main>
  <section id="timerView"></section>
  <section id="statsView" class="hidden"></section>
  <section id="profileView" class="hidden"></section>
</main>

<script>
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const pad = n => String(n).padStart(2,"0");
function keyFromDate(input){
  const d = new Date(input);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function makeDate(key, time="12:00"){
  const [y,m,d] = key.split("-").map(Number);
  const [hh,mm] = time.split(":").map(Number);
  return new Date(y,m-1,d,hh,mm,0,0);
}
const today = new Date();
const todayKey = keyFromDate(today);
function weekStart(date){
  const d = new Date(date);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  d.setHours(0,0,0,0);
  return d;
}
function fmtDur(sec){
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  const s = sec%60;
  return h ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
}
function fmtHours(sec){
  const h = sec/3600;
  return h < 1 ? `${Math.round(sec/60)} min` : `${h.toFixed(1)} h`;
}
function sum(sessions){return sessions.reduce((a,s)=>a+s.duration,0)}
function daysAgo(days,h,m){
  const d = new Date();
  d.setDate(d.getDate()-days);
  d.setHours(h,m,0,0);
  return d.toISOString();
}
function weekDays(){
  const start = weekStart(today);
  return Array.from({length:7},(_,i)=>{
    const d = new Date(start);
    d.setDate(start.getDate()+i);
    return d;
  });
}
function monthDays(){
  const y=today.getFullYear(), m=today.getMonth();
  const n = new Date(y,m+1,0).getDate();
  return Array.from({length:n},(_,i)=>new Date(y,m,i+1));
}
function oneDay(){return [today]}

let state = JSON.parse(localStorage.getItem("focusleaf-v3") || "null") || {
  tab:"timer",
  mode:"countdown",
  targetMin:60,
  elapsed:0,
  running:false,
  startedAt:null,
  paused:false,
  msg:"",
  dailyGoalMin:120,
  range:"week",
  selectedDay:todayKey,
  sessions:[
    {id:"s1",start:daysAgo(6,16,5),duration:3900,mode:"Countdown",completed:true},
    {id:"s2",start:daysAgo(5,10,30),duration:2700,mode:"Stopwatch",completed:true},
    {id:"s3",start:daysAgo(4,15,45),duration:5700,mode:"Countdown",completed:true},
    {id:"s4",start:daysAgo(3,21,10),duration:2700,mode:"Stopwatch",completed:true},
    {id:"s5",start:daysAgo(2,16,0),duration:7200,mode:"Countdown",completed:true},
    {id:"s6",start:daysAgo(1,14,20),duration:2700,mode:"Stopwatch",completed:true},
    {id:"s7",start:daysAgo(1,18,15),duration:3000,mode:"Countdown",completed:true}
  ]
};
function save(){localStorage.setItem("focusleaf-v3", JSON.stringify(state))}
function setTab(tab){state.tab=tab;save();render()}
$$("nav button").forEach(btn => btn.onclick = () => setTab(btn.dataset.tab));

function sessionsForKeys(keys){return state.sessions.filter(s=>keys.includes(keyFromDate(s.start)))}
function dayMap(){
  return state.sessions.reduce((m,s)=>{
    const k=keyFromDate(s.start);
    m[k]=(m[k]||0)+s.duration;
    return m;
  },{});
}
function streak(){
  const map = dayMap();
  let st=0;
  const d=new Date(today);
  while((map[keyFromDate(d)]||0) >= state.dailyGoalMin*60){
    st++;
    d.setDate(d.getDate()-1);
  }
  return st;
}
function bestDay(){
  const entries=Object.entries(dayMap());
  return entries.length ? entries.reduce((a,b)=>b[1]>a[1]?b:a,entries[0]) : ["—",0];
}
function bestWeek(){
  const m={};
  state.sessions.forEach(s=>{
    const k=keyFromDate(weekStart(s.start));
    m[k]=(m[k]||0)+s.duration;
  });
  const entries=Object.entries(m);
  return entries.length ? entries.reduce((a,b)=>b[1]>a[1]?b:a,entries[0]) : ["—",0];
}
function setDailyGoal(v){state.dailyGoalMin=Math.max(15,Math.min(360,v));save();render()}
function setTarget(v){state.targetMin=Math.max(0,Math.min(180,v));state.elapsed=0;save();render()}
function start(){
  if(state.mode==="countdown" && state.targetMin===0) return;
  if(!state.startedAt) state.startedAt = new Date().toISOString();
  state.msg="";
  state.paused=false;
  state.running=true;
  save();render();
}
function pause(){state.running=false;save();render()}
function reset(){state.running=false;state.elapsed=0;state.startedAt=null;state.paused=false;save();render()}
function saveSession(completed=false){
  if(!state.startedAt || state.elapsed < 60) return;
  state.sessions.unshift({
    id:"s"+Date.now(),
    start:state.startedAt,
    duration:state.elapsed,
    mode:state.mode==="countdown" ? "Countdown" : "Stopwatch",
    completed
  });
  state.msg = completed ? "Session completed. Nice work." : "Study time saved.";
  state.running=false;
  state.elapsed=0;
  state.startedAt=null;
  save();render();
}
function tick(){
  if(!state.running) return;
  state.elapsed++;
  if(state.mode==="countdown" && state.targetMin>0 && state.elapsed>=state.targetMin*60){
    state.elapsed=state.targetMin*60;
    saveSession(true);
    return;
  }
  save();
  if(state.tab==="timer") renderTimer();
}
setInterval(tick,1000);
document.addEventListener("visibilitychange",()=>{
  if(document.hidden && state.running){
    state.running=false;
    state.paused=true;
    save();render();
  }
});
window.addEventListener("blur",()=>{
  if(state.running){
    state.running=false;
    state.paused=true;
    save();render();
  }
});

function heroStats(){
  const todayTotal=sum(state.sessions.filter(s=>keyFromDate(s.start)===todayKey));
  const monthTotal=sum(sessionsForKeys(monthDays().map(keyFromDate)));
  return `<div class="stats3">
    <div class="statBox"><b>${fmtHours(todayTotal)}</b><span>today</span></div>
    <div class="statBox"><b>${streak()}</b><span>day streak</span></div>
    <div class="statBox"><b>${fmtHours(monthTotal)}</b><span>month</span></div>
  </div>`;
}
function stepper(label,value,minus,plus,presets){
  return `<div>
    <div class="sectionHead">
      <div><h3>${label}</h3></div>
      <span class="pill">${value} min</span>
    </div>
    <div class="stepper">
      <button class="stepBtn" onclick="${minus}">−</button>
      <div class="valueDisplay">${value}<br><span style="font-size:13px;font-weight:800">minutes</span></div>
      <button class="stepBtn" onclick="${plus}">+</button>
    </div>
    <div class="presets">
      ${presets.map(p=>`<button class="preset ${p===value?'active':''}" onclick="${label==='Daily goal'?'setDailyGoal':'setTarget'}(${p})">${p}</button>`).join("")}
    </div>
  </div>`;
}
function renderTimer(){
  const todayTotal=sum(state.sessions.filter(s=>keyFromDate(s.start)===todayKey));
  const remaining=Math.max(0,state.targetMin*60-state.elapsed);
  const display=state.mode==="countdown" ? remaining : state.elapsed;
  const progress=state.mode==="countdown" ? (state.targetMin ? Math.min(1,state.elapsed/(state.targetMin*60)) : 0) : Math.min(1,state.elapsed/Math.max(3600,state.elapsed));
  const circumference=2*Math.PI*113;
  $("#timerView").innerHTML = `
    <div class="hero">
      <div>
        <div class="eyebrow">Forest-style focus app · general study</div>
        <h2>Study without touching your phone.</h2>
        <p class="subtitle">Use a countdown or stopwatch. If you leave the app, the timer pauses and only real focus time counts.</p>
      </div>
      ${heroStats()}
    </div>

    <div class="card">
      <div class="sectionHead">
        <div>
          <h3>Daily goal</h3>
          <p class="smallText">Progress resets every day. Keep the streak alive.</p>
        </div>
      </div>
      ${stepper("Daily goal", state.dailyGoalMin, "setDailyGoal(state.dailyGoalMin-15)", "setDailyGoal(state.dailyGoalMin+15)", [60,120,180,240])}
      <div class="progressOuter"><div class="progressInner" style="width:${Math.min(100,todayTotal/(state.dailyGoalMin*60)*100)}%"></div></div>
      <p class="smallText">Today: ${fmtHours(todayTotal)} / ${state.dailyGoalMin} min · Best day: ${fmtHours(bestDay()[1])} · Best week: ${fmtHours(bestWeek()[1])}</p>
    </div>

    <div class="card">
      <h2 class="title" style="font-size:31px">Study focus timer</h2>
      <p class="subtitle">If you leave the app or lock the phone, the timer pauses.</p>

      <div class="modeTabs">
        <button class="${state.mode==='countdown'?'active':''}" onclick="state.mode='countdown';reset()">Countdown</button>
        <button class="${state.mode==='stopwatch'?'active':''}" onclick="state.mode='stopwatch';reset()">Stopwatch</button>
      </div>

      <div class="timerCircle">
        <svg width="260" height="260">
          <circle cx="130" cy="130" r="113" stroke="#27272a" stroke-width="14" fill="none"></circle>
          <circle cx="130" cy="130" r="113" stroke="var(--accent)" stroke-width="14" fill="none" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${circumference-progress*circumference}"></circle>
        </svg>
        <div class="timerCenter">
          <div>
            <div class="leafBubble">🍃</div>
            <div class="time">${fmtDur(display)}</div>
            <div class="sub">${state.mode==="countdown" ? fmtDur(state.elapsed)+" studied" : "elapsed study time"}</div>
          </div>
        </div>
      </div>

      ${state.paused?'<div class="okmsg" style="color:#fde68a;background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.2)">Paused: app not focused</div>':""}
      ${state.msg?`<div class="okmsg">${state.msg}</div>`:""}

      ${state.mode==="countdown" ? stepper("Study goal", state.targetMin, "setTarget(state.targetMin-5)", "setTarget(state.targetMin+5)", [25,45,60,90]) : ""}

      <div class="actions">
        <button class="btn primary" onclick="start()" ${state.running || (state.mode==="countdown" && state.targetMin===0) ? "disabled" : ""}>Start</button>
        <button class="btn ghost" onclick="pause()" ${!state.running ? "disabled" : ""}>Pause</button>
        <button class="btn ghost" onclick="saveSession(false)" ${state.elapsed<60 ? "disabled" : ""}>Save</button>
        <button class="btn ghost" onclick="reset()">Reset</button>
      </div>

      <div class="notice"><b style="color:var(--text)">Anti-distraction rule</b><br>Leaving the app/browser pauses the timer. This is a PWA; a native Android app could enforce this more strongly.</div>
    </div>
  `;
}
function rangeDays(){
  if(state.range==="day") return oneDay();
  if(state.range==="week") return weekDays();
  return monthDays();
}
function renderStats(){
  const days=rangeDays();
  const keys=days.map(keyFromDate);
  if(!keys.includes(state.selectedDay)) state.selectedDay = keys.includes(todayKey) ? todayKey : keys[keys.length-1];
  const filtered=sessionsForKeys(keys);
  const selected=state.sessions.filter(s=>keyFromDate(s.start)===state.selectedDay);
  const total=sum(filtered);
  const selectedTotal=sum(selected);
  const avg=total/days.length;
  const weekTotal=sum(sessionsForKeys(weekDays().map(keyFromDate)));
  const monthTotal=sum(sessionsForKeys(monthDays().map(keyFromDate)));
  $("#statsView").innerHTML = `
    <div>
      <h2 class="title">Statistics</h2>
      <p class="subtitle">Everything is stacked vertically so it fits properly on your phone.</p>
      <div class="rangeTabs">
        <button class="${state.range==='day'?'active':''}" onclick="state.range='day';state.selectedDay='${todayKey}';save();render()">Day</button>
        <button class="${state.range==='week'?'active':''}" onclick="state.range='week';state.selectedDay='${todayKey}';save();render()">Week</button>
        <button class="${state.range==='month'?'active':''}" onclick="state.range='month';state.selectedDay='${todayKey}';save();render()">Month</button>
      </div>
    </div>

    <div class="statGrid">
      <div class="metric"><span>Selected range</span><b>${fmtHours(total)}</b></div>
      <div class="metric"><span>Average per day</span><b>${fmtHours(avg)}</b></div>
      <div class="metric"><span>Selected day</span><b>${fmtHours(selectedTotal)}</b></div>
      <div class="metric"><span>This week</span><b>${fmtHours(weekTotal)}</b><span>This month: ${fmtHours(monthTotal)}</span></div>
    </div>

    <div class="card">
      <div class="sectionHead">
        <div>
          <h3>Study time by day</h3>
          <p class="smallText">Tap a day to inspect it. Month view scrolls only inside this card.</p>
        </div>
        <span class="pill">${state.selectedDay}</span>
      </div>
      ${dayChart(days)}
    </div>

    <div class="card">${heatmap(selected,"Selected day by hour")}</div>
    <div class="card">${heatmap(filtered,"Average study hour in range")}</div>

    <div class="card">
      <h3>Add manual session</h3>
      <form class="form" onsubmit="addManual(event)">
        <input id="manDate" type="date" value="${todayKey}">
        <input id="manTime" type="time" value="16:00">
        <input id="manMin" type="number" min="1" max="720" value="45">
        <button class="btn primary">Add</button>
      </form>
    </div>

    <div class="card">
      <h3>Recent sessions for selected day</h3>
      ${selected.length ? selected.map(sessionRow).join("") : '<p class="smallText">No sessions this day.</p>'}
    </div>
  `;
}
function dayChart(days){
  const max=Math.max(1,...days.map(d=>sum(state.sessions.filter(s=>keyFromDate(s.start)===keyFromDate(d)))));
  return `<div class="chart range-${state.range}">
    ${days.map(d=>{
      const k=keyFromDate(d);
      const total=sum(state.sessions.filter(s=>keyFromDate(s.start)===k));
      const h=Math.max(4,total/max*100);
      return `<button class="barDay ${k===state.selectedDay?'selected':''}" onclick="state.selectedDay='${k}';save();render()">
        <div class="barShell"><div class="barFill" style="height:${h}%"></div></div>
        <strong>${new Intl.DateTimeFormat('pt-PT',{day:'2-digit'}).format(d)}</strong>
        <small>${fmtHours(total)}</small>
      </button>`;
    }).join("")}
  </div>`;
}
function heatmap(sessions,title){
  const buckets=Array.from({length:24},(_,h)=>({h,sec:0}));
  sessions.forEach(s=>buckets[new Date(s.start).getHours()].sec += s.duration);
  const max=Math.max(1,...buckets.map(b=>b.sec));
  const peak=buckets.reduce((a,b)=>b.sec>a.sec?b:a,buckets[0]);
  return `<div class="sectionHead">
    <div><h3>${title}</h3><p class="smallText">Based on session start time.</p></div>
    <span class="pill">${pad(peak.h)}:00</span>
  </div>
  <div class="heat">
    ${buckets.map(b=>`<div class="heatItem"><div class="heatCell" style="background:rgba(134,239,172,${0.07+b.sec/max*0.72})"></div><small>${pad(b.h)}</small></div>`).join("")}
  </div>`;
}
function sessionRow(s){
  return `<div class="session">
    <div><b>${fmtHours(s.duration)} · ${s.mode}</b><p>${new Intl.DateTimeFormat("pt-PT",{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}).format(new Date(s.start))}</p></div>
    <button class="btn ghost" onclick="deleteSession('${s.id}')">Delete</button>
  </div>`;
}
function addManual(e){
  e.preventDefault();
  const start=makeDate($("#manDate").value,$("#manTime").value);
  const duration=Math.max(1,+$("#manMin").value)*60;
  state.sessions.unshift({id:"m"+Date.now(),start:start.toISOString(),duration,mode:"Manual",completed:true});
  state.selectedDay=keyFromDate(start);
  save();render();
}
function deleteSession(id){
  state.sessions=state.sessions.filter(s=>s.id!==id);
  save();render();
}
function renderProfile(){
  const bd=bestDay(), bw=bestWeek();
  $("#profileView").innerHTML = `
    <div class="card profileHero">
      <div class="avatar">L</div>
      <div>
        <h2 class="title">Study profile</h2>
        <p class="subtitle">General study tracking · no subjects needed</p>
        <p class="subtitle">Goal: protect real focus time. If you leave the app, the session stops counting.</p>
        <div class="profileStats">
          <div><b>${fmtHours(sum(state.sessions))}</b><span>total studied</span></div>
          <div><b>${streak()}</b><span>day streak</span></div>
          <div><b>${state.dailyGoalMin} min</b><span>daily goal</span></div>
        </div>
      </div>
    </div>
    <div class="records">
      <div class="metric"><span>Best day</span><b>${fmtHours(bd[1])}</b><span>${bd[0]}</span></div>
      <div class="metric"><span>Best week</span><b>${fmtHours(bw[1])}</b><span>week of ${bw[0]}</span></div>
      <div class="metric"><span>Current streak</span><b>${streak()}</b><span>days</span></div>
      <div class="metric"><span>Sessions</span><b>${state.sessions.length}</b><span>tracked</span></div>
    </div>
    <div class="card">
      <h3>Real app notes</h3>
      <p class="subtitle">This PWA works in the browser and can be installed to your home screen. A native Android app could detect app switching/screen locking more strongly.</p>
    </div>
  `;
}
function render(){
  $$("nav button").forEach(btn=>btn.classList.toggle("active",btn.dataset.tab===state.tab));
  $("#timerView").classList.toggle("hidden",state.tab!=="timer");
  $("#statsView").classList.toggle("hidden",state.tab!=="stats");
  $("#profileView").classList.toggle("hidden",state.tab!=="profile");
  if(state.tab==="timer") renderTimer();
  if(state.tab==="stats") renderStats();
  if(state.tab==="profile") renderProfile();
}
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
render();
</script>
</body>
</html>
