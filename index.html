<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>FocusLeaf</title>
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="FocusLeaf" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <style>
    :root{
      --bg:#09090b;--panel:#18181b;--panel2:#111113;--panel3:#202023;--muted:#a1a1aa;--muted2:#71717a;
      --text:#fafafa;--line:rgba(255,255,255,.10);--accent:#86efac;--accent2:#34d399
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
    button,input{font:inherit}
    header{position:sticky;top:0;z-index:10;background:rgba(9,9,11,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    .top{max-width:860px;margin:auto;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}.logo{width:52px;height:52px;border-radius:18px;background:var(--accent);color:#052e16;display:grid;place-items:center;font-size:26px;font-weight:900;flex:0 0 auto}
    h1{font-size:21px;margin:0;letter-spacing:.2px}.brand p{margin:2px 0 0;color:var(--muted);font-size:13px}
    nav{display:flex;background:#27272a;border-radius:18px;padding:5px;gap:4px;width:100%;max-width:430px}
    nav button{flex:1;border:0;background:transparent;color:var(--muted);padding:10px 12px;border-radius:14px;font-weight:800;cursor:pointer}
    nav button.active{background:var(--accent);color:#052e16}
    main{max-width:860px;margin:auto;padding:22px 16px 32px;display:grid;gap:20px}
    .hidden{display:none!important}
    .hero,.card{background:var(--panel);border:1px solid var(--line);border-radius:28px;box-shadow:0 18px 45px rgba(0,0,0,.18);max-width:100%;overflow:hidden}
    .hero{padding:24px;display:grid;gap:20px}
    .hero h2{font-size:34px;line-height:1.05;margin:6px 0 10px;letter-spacing:-.7px}.hero p{color:var(--muted);line-height:1.55;margin:0;font-size:15px}
    .eyebrow{color:var(--accent);font-weight:900;font-size:14px}
    .stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .stat{background:rgba(255,255,255,.05);border-radius:20px;padding:14px 10px;text-align:center;min-width:0}.stat b{font-size:20px;display:block}.stat span{font-size:12px;color:var(--muted2)}
    .card{padding:20px}.sectionTitle{font-size:27px;font-weight:900;margin:0 0 8px}.sectionSub{color:var(--muted);margin:0;font-size:14px;line-height:1.5}
    .goalLine{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.goalLine label{margin:0}
    label{display:block;font-size:14px;color:#d4d4d8;font-weight:800;margin-bottom:10px}.pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;background:var(--accent);color:#052e16;font-weight:900;padding:7px 13px;font-size:14px;white-space:nowrap}
    .barOuter{height:12px;border-radius:999px;background:#27272a;overflow:hidden}.barInner{height:12px;border-radius:999px;background:var(--accent);transition:.25s}
    .timerGrid{display:grid;grid-template-columns:280px minmax(0,1fr);gap:28px;align-items:center}
    .circle{width:260px;height:260px;position:relative;margin:auto}.circle svg{transform:rotate(-90deg)}.center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
    .leaf{width:62px;height:62px;border-radius:999px;background:rgba(134,239,172,.12);color:var(--accent);display:grid;place-items:center;font-size:30px;margin-bottom:12px}.time{font-size:44px;font-weight:950;letter-spacing:-1px}.sub{font-size:13px;color:var(--muted)}
    .tabs2,.rangeTabs{display:flex;background:#27272a;border-radius:18px;padding:5px;gap:4px}
    .tabs2 button,.rangeTabs button{border:0;background:transparent;color:var(--muted);padding:10px 14px;border-radius:14px;font-weight:850;cursor:pointer}
    .tabs2 button.active,.rangeTabs button.active{background:var(--accent);color:#052e16}
    .timerHeader{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
    .sliderControl{display:grid;grid-template-columns:46px minmax(0,1fr) 46px;gap:12px;align-items:center;margin-top:12px}
    .roundBtn{height:46px;width:46px;border-radius:999px;border:1px solid var(--line);background:#27272a;color:var(--text);font-size:24px;font-weight:900;cursor:pointer}
    .roundBtn:active{transform:scale(.96)}
    .focus-slider{appearance:none;-webkit-appearance:none;width:100%;height:24px;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2));outline:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 10px 30px rgba(0,0,0,.25);touch-action:pan-y}
    .focus-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:42px;height:42px;border-radius:999px;background:#f4f4f5;border:5px solid var(--accent);box-shadow:0 8px 24px rgba(0,0,0,.35);cursor:grab}
    .focus-slider::-moz-range-thumb{width:42px;height:42px;border-radius:999px;background:#f4f4f5;border:5px solid var(--accent);box-shadow:0 8px 24px rgba(0,0,0,.35);cursor:grab}
    .scale{display:flex;justify-content:space-between;color:var(--muted2);font-size:12px;margin-top:12px}
    .buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}.btn{border:0;border-radius:16px;padding:13px 14px;font-weight:900;cursor:pointer}.primary{background:var(--accent);color:#052e16}.ghost{background:#27272a;color:#f4f4f5;border:1px solid var(--line)}.primary:disabled,.ghost:disabled{opacity:.45;cursor:not-allowed}
    .note{margin-top:18px;border:1px solid var(--line);background:var(--panel2);border-radius:22px;padding:14px;color:var(--muted);line-height:1.55;font-size:14px}.okmsg{background:rgba(134,239,172,.10);border:1px solid rgba(134,239,172,.2);color:#bbf7d0;border-radius:22px;padding:14px;font-size:14px;font-weight:800;margin-bottom:14px}
    .statsHeader{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}.statsHeader .rangeTabs{width:100%;max-width:390px}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.smallCard{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:18px;min-width:0}.smallCard p{color:var(--muted);font-size:13px;margin:0}.smallCard b{font-size:24px;margin-top:6px;display:block;letter-spacing:.2px}
    .chartScroll{width:100%;overflow-x:auto;overflow-y:hidden;padding-bottom:4px;-webkit-overflow-scrolling:touch}.chart{height:220px;display:flex;align-items:end;gap:10px;margin-top:22px;min-width:100%}
    .chart.month{min-width:760px}.chart.week{min-width:100%}.chart.day{min-width:100%}
    .day{flex:1;min-width:54px;display:flex;flex-direction:column;align-items:center;gap:8px;background:transparent;border:0;padding:0;color:inherit;cursor:pointer}.barBox{height:165px;width:100%;background:#27272a;border-radius:18px;display:flex;align-items:end;padding:5px}.bar{width:100%;background:#52525b;border-radius:14px;min-height:6px}.day.selected .barBox{outline:2px solid var(--accent);background:rgba(134,239,172,.10)}.day.selected .bar{background:var(--accent)}.day small{font-size:10px;color:var(--muted2);line-height:1.2}.day strong{font-size:12px;color:#d4d4d8}
    .heatGrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:18px}.heatCell{height:42px;border-radius:13px;border:1px solid rgba(134,239,172,.08)}
    .twoCol{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    input{width:100%;background:#09090b;color:var(--text);border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit;min-width:0}.manualForm{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px}
    .session{display:flex;justify-content:space-between;gap:12px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:18px;padding:13px;margin-top:10px}.session p{margin:0;color:var(--muted);font-size:12px}.session b{display:block;color:var(--text)}
    .profileHero{display:grid;grid-template-columns:110px minmax(0,1fr);gap:18px;align-items:center}.avatar{width:110px;height:110px;border-radius:28px;background:var(--accent);display:grid;place-items:center;color:#052e16;font-size:50px;font-weight:950}
    .profileStats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}.profileStats div{background:#202023;border:1px solid var(--line);border-radius:20px;padding:13px}.profileStats b{display:block}.profileStats span{color:var(--muted);font-size:12px}
    @media(max-width:720px){
      .top{display:block}.brand{margin-bottom:14px}nav{max-width:none}
      main{padding:20px 14px 28px;gap:18px}.hero,.card{border-radius:26px;padding:18px}.hero h2{font-size:30px}
      .timerGrid{grid-template-columns:1fr;gap:20px}.timerHeader{display:block}.tabs2{margin-top:14px;width:100%}.tabs2 button{flex:1}
      .grid4{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.twoCol{grid-template-columns:1fr;gap:14px}.manualForm{grid-template-columns:1fr 1fr;gap:10px}.manualForm button{grid-column:1/-1}
      .buttons{grid-template-columns:repeat(2,1fr)}.profileHero{grid-template-columns:1fr}.avatar{width:95px;height:95px}.profileStats{grid-template-columns:1fr}
      .chart.week .day{min-width:62px}.chart.day .day{min-width:100%}.chart.month .day{min-width:42px}
    }
  </style>
</head>
<body>
<header>
  <div class="top">
    <div class="brand"><div class="logo">🍃</div><div><h1>FocusLeaf</h1><p>Study timer that stops when you leave the app.</p></div></div>
    <nav><button data-tab="timer" class="active">Timer</button><button data-tab="stats">Statistics</button><button data-tab="profile">Profile</button></nav>
  </div>
</header>
<main><section id="timerView"></section><section id="statsView" class="hidden"></section><section id="profileView" class="hidden"></section></main>
<script>
const $=s=>document.querySelector(s); const $$=s=>[...document.querySelectorAll(s)];
const pad=n=>String(n).padStart(2,'0');
function localDateKey(input){ const d=new Date(input); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function makeLocalDate(key,h=12,m=0){ const [y,mo,d]=key.split('-').map(Number); return new Date(y,mo-1,d,h,m,0,0); }
const nowBase=new Date(); const todayKey=localDateKey(nowBase);
function weekStart(date){const d=new Date(date);const day=d.getDay()||7;d.setDate(d.getDate()-day+1);d.setHours(0,0,0,0);return d}
function fmtDur(sec){sec=Math.max(0,Math.floor(sec));const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return h?`${h}:${pad(m)}:${pad(s)}`:`${m}:${pad(s)}`}
function fmtHours(sec){const h=sec/3600;return h<1?`${Math.round(sec/60)} min`:`${h.toFixed(1)} h`}
function sum(arr){return arr.reduce((s,x)=>s+x.duration,0)}
function getWeekDays(){const start=weekStart(nowBase);return Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d})}
function getMonthDays(){const y=nowBase.getFullYear(),m=nowBase.getMonth(),days=new Date(y,m+1,0).getDate();return Array.from({length:days},(_,i)=>new Date(y,m,i+1))}
function getLastDays(n){return Array.from({length:n},(_,i)=>{const d=new Date(nowBase);d.setDate(nowBase.getDate()-(n-1-i));return d})}
function daysAgo(days,h,m){const d=new Date();d.setDate(d.getDate()-days);d.setHours(h,m,0,0);return d.toISOString()}
let state=JSON.parse(localStorage.getItem('focusleaf-pwa-v2')||'null')||{tab:'timer',mode:'countdown',targetMin:60,elapsed:0,running:false,startedAt:null,paused:false,msg:'',dailyGoalMin:120,range:'week',selectedDay:todayKey,sessions:[{id:'s1',start:daysAgo(6,16,5),duration:3900,mode:'Countdown',completed:true},{id:'s2',start:daysAgo(5,10,30),duration:2700,mode:'Stopwatch',completed:true},{id:'s3',start:daysAgo(4,15,45),duration:5700,mode:'Countdown',completed:true},{id:'s4',start:daysAgo(3,21,10),duration:2700,mode:'Stopwatch',completed:true},{id:'s5',start:daysAgo(2,16,0),duration:7200,mode:'Countdown',completed:true},{id:'s6',start:daysAgo(1,14,20),duration:2700,mode:'Stopwatch',completed:true},{id:'s7',start:daysAgo(1,18,15),duration:3000,mode:'Countdown',completed:true}]};
function save(){localStorage.setItem('focusleaf-pwa-v2',JSON.stringify(state))}
function byDay(){return state.sessions.reduce((m,s)=>{const k=localDateKey(s.start);m[k]=(m[k]||0)+s.duration;return m},{})}
function streak(){const map=byDay();let st=0,d=new Date(nowBase);while((map[localDateKey(d)]||0)>=state.dailyGoalMin*60){st++;d.setDate(d.getDate()-1)}return st}
function bestDay(){const e=Object.entries(byDay());return e.length?e.reduce((a,b)=>b[1]>a[1]?b:a,e[0]):['—',0]}
function bestWeek(){const map={};state.sessions.forEach(s=>{const k=localDateKey(weekStart(s.start));map[k]=(map[k]||0)+s.duration});const e=Object.entries(map);return e.length?e.reduce((a,b)=>b[1]>a[1]?b:a,e[0]):['—',0]}
function sessionsInDays(days){const keys=days.map(localDateKey);return state.sessions.filter(s=>keys.includes(localDateKey(s.start)))}
function setTab(t){state.tab=t;save();render()} $$('nav button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
function setMinutes(value){state.targetMin=Math.max(0,Math.min(180,value));state.elapsed=0;save();render()}
function setDailyGoal(value){state.dailyGoalMin=Math.max(15,Math.min(360,value));save();render()}
function tick(){if(!state.running)return;state.elapsed++;if(state.mode==='countdown'&&state.targetMin>0&&state.elapsed>=state.targetMin*60){state.elapsed=state.targetMin*60;saveSession(true)}save();if(state.tab==='timer')renderTimer()}
setInterval(tick,1000);
function start(){if(state.mode==='countdown'&&state.targetMin===0)return;if(!state.startedAt)state.startedAt=new Date().toISOString();state.msg='';state.paused=false;state.running=true;save();render()}
function pause(){state.running=false;save();render()} function reset(){state.running=false;state.elapsed=0;state.startedAt=null;state.paused=false;save();render()}
function saveSession(completed=false){if(!state.startedAt||state.elapsed<60)return;state.sessions.unshift({id:'s'+Date.now(),start:state.startedAt,duration:state.elapsed,mode:state.mode==='countdown'?'Countdown':'Stopwatch',completed});state.msg=completed?'Session completed. Nice work.':'Study time saved.';state.running=false;state.elapsed=0;state.startedAt=null;save();render()}
document.addEventListener('visibilitychange',()=>{if(document.hidden&&state.running){state.running=false;state.paused=true;save();render()}}); window.addEventListener('blur',()=>{if(state.running){state.running=false;state.paused=true;save();render()}});
function heroStats(){const today=sum(state.sessions.filter(s=>localDateKey(s.start)===todayKey)),month=sum(sessionsInDays(getMonthDays()));return `<div class="stats3"><div class="stat"><b>${fmtHours(today)}</b><span>today</span></div><div class="stat"><b>${streak()}</b><span>day streak</span></div><div class="stat"><b>${fmtHours(month)}</b><span>month</span></div></div>`}
function renderTimer(){const today=sum(state.sessions.filter(s=>localDateKey(s.start)===todayKey)),remaining=Math.max(0,state.targetMin*60-state.elapsed),display=state.mode==='countdown'?remaining:state.elapsed,progress=state.mode==='countdown'?(state.targetMin?Math.min(1,state.elapsed/(state.targetMin*60)):0):Math.min(1,state.elapsed/Math.max(3600,state.elapsed));
$('#timerView').innerHTML=`<div class="hero"><div><div class="eyebrow">Forest-style focus app · general study</div><h2>Study without touching your phone.</h2><p>Use a countdown or stopwatch. If you leave the app, the timer pauses and only real focus time counts.</p></div>${heroStats()}</div>
<div class="card"><div class="goalLine"><div><label>Daily goal</label><p class="sectionSub">Progress resets every day. Keep the streak alive.</p></div><span class="pill">${state.dailyGoalMin} min</span></div><div class="sliderControl"><button class="roundBtn" onclick="setDailyGoal(state.dailyGoalMin-15)">−</button><input class="focus-slider" type="range" min="15" max="360" step="15" value="${state.dailyGoalMin}" oninput="setDailyGoal(+this.value)"><button class="roundBtn" onclick="setDailyGoal(state.dailyGoalMin+15)">+</button></div><div class="barOuter" style="margin-top:18px"><div class="barInner" style="width:${Math.min(100,today/(state.dailyGoalMin*60)*100)}%"></div></div><p style="color:var(--muted2);font-size:12px;margin-bottom:0">Today: ${fmtHours(today)} / ${state.dailyGoalMin} min · Best day: ${fmtHours(bestDay()[1])} · Best week: ${fmtHours(bestWeek()[1])}</p></div>
<div class="card"><div class="timerHeader"><div><h2 class="sectionTitle">Study focus timer</h2><p class="sectionSub">If you leave the app or lock the phone, the timer pauses.</p></div><div class="tabs2"><button onclick="state.mode='countdown';reset()" class="${state.mode==='countdown'?'active':''}">Countdown</button><button onclick="state.mode='stopwatch';reset()" class="${state.mode==='stopwatch'?'active':''}">Stopwatch</button></div></div><div class="timerGrid" style="margin-top:22px"><div class="circle"><svg width="260" height="260"><circle cx="130" cy="130" r="113" stroke="#27272a" stroke-width="14" fill="none"/><circle cx="130" cy="130" r="113" stroke="var(--accent)" stroke-width="14" fill="none" stroke-linecap="round" stroke-dasharray="${2*Math.PI*113}" stroke-dashoffset="${2*Math.PI*113-progress*(2*Math.PI*113)}"/></svg><div class="center"><div class="leaf">🍃</div><div class="time">${fmtDur(display)}</div><div class="sub">${state.mode==='countdown'?fmtDur(state.elapsed)+' studied':'elapsed study time'}</div>${state.paused?'<div style="margin-top:12px;color:#fde68a;background:rgba(251,191,36,.1);padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800">Paused: app not focused</div>':''}</div></div><div>${state.msg?`<div class="okmsg">${state.msg}</div>`:''}${state.mode==='countdown'?`<div class="goalLine"><label>Study goal</label><span class="pill">${state.targetMin} min</span></div><div class="sliderControl"><button class="roundBtn" onclick="setMinutes(state.targetMin-1)" ${state.running?'disabled':''}>−</button><input class="focus-slider" type="range" min="0" max="180" step="1" value="${state.targetMin}" ${state.running?'disabled':''} oninput="setMinutes(+this.value)"><button class="roundBtn" onclick="setMinutes(state.targetMin+1)" ${state.running?'disabled':''}>+</button></div><div class="scale"><span>0 min</span><span>90 min</span><span>180 min / 3h</span></div>${state.targetMin===0?'<p style="color:#fde68a;font-size:12px">Choose at least 1 minute to start.</p>':''}`:''}<div class="buttons"><button class="btn primary" onclick="start()" ${state.running||state.mode==='countdown'&&state.targetMin===0?'disabled':''}>Start</button><button class="btn ghost" onclick="pause()" ${!state.running?'disabled':''}>Pause</button><button class="btn ghost" onclick="saveSession(false)" ${state.elapsed<60?'disabled':''}>Save</button><button class="btn ghost" onclick="reset()">Reset</button></div><div class="note"><b style="color:var(--text)">Anti-distraction rule</b><br>Leaving the app/browser pauses the timer. In a real native Android app, opening another app or locking the screen can pause it even more reliably.</div></div></div></div>`}
function renderStats(){const days=state.range==='day'?getLastDays(1):state.range==='week'?getWeekDays():getMonthDays(),keys=days.map(localDateKey);if(!keys.includes(state.selectedDay))state.selectedDay=keys.includes(todayKey)?todayKey:keys[keys.length-1];const filtered=sessionsInDays(days),selected=state.sessions.filter(s=>localDateKey(s.start)===state.selectedDay),total=sum(filtered),selectedTotal=sum(selected),avg=total/days.length,week=sum(sessionsInDays(getWeekDays())),month=sum(sessionsInDays(getMonthDays()));
$('#statsView').innerHTML=`<div class="statsHeader"><div><h2 class="sectionTitle">Statistics</h2><p class="sectionSub">Track study time by day, week, month and hour.</p></div><div class="rangeTabs"><button class="${state.range==='day'?'active':''}" onclick="state.range='day';state.selectedDay='${todayKey}';save();render()">Day</button><button class="${state.range==='week'?'active':''}" onclick="state.range='week';state.selectedDay='${todayKey}';save();render()">Week</button><button class="${state.range==='month'?'active':''}" onclick="state.range='month';state.selectedDay='${todayKey}';save();render()">Month</button></div></div>
<div class="grid4"><div class="smallCard"><p>Selected range</p><b>${fmtHours(total)}</b></div><div class="smallCard"><p>Average per day</p><b>${fmtHours(avg)}</b></div><div class="smallCard"><p>Selected day</p><b>${fmtHours(selectedTotal)}</b></div><div class="smallCard"><p>This week</p><b>${fmtHours(week)}</b><p>This month: ${fmtHours(month)}</p></div></div>
<div class="card"><div class="goalLine"><div><h3 style="margin:0">Study time by day</h3><p class="sectionSub">Tap a day to inspect it.</p></div><span class="pill">${state.selectedDay}</span></div>${dayChart(days)}</div>
<div class="twoCol"><div class="card">${heatmap(selected,'Selected day by hour')}</div><div class="card">${heatmap(filtered,'Average study hour in range')}</div></div>
<div class="card"><h3 style="margin-top:0">Add manual session</h3><form onsubmit="addManual(event)" class="manualForm"><input id="manDate" type="date" value="${todayKey}"><input id="manTime" type="time" value="16:00"><input id="manMin" type="number" min="1" max="720" value="45"><button class="btn primary">Add</button></form></div>
<div class="card"><h3 style="margin-top:0">Recent sessions for selected day</h3>${selected.length?selected.map(sessionRow).join(''):'<p style="color:var(--muted)">No sessions this day.</p>'}</div>`}
function dayChart(days){const max=Math.max(1,...days.map(d=>sum(state.sessions.filter(s=>localDateKey(s.start)===localDateKey(d)))));const cls=state.range;return `<div class="chartScroll"><div class="chart ${cls}">${days.map(d=>{const k=localDateKey(d),total=sum(state.sessions.filter(s=>localDateKey(s.start)===k)),h=Math.max(4,total/max*100);return `<button class="day ${k===state.selectedDay?'selected':''}" onclick="state.selectedDay='${k}';save();render()"><div class="barBox"><div class="bar" style="height:${h}%"></div></div><strong>${new Intl.DateTimeFormat('pt-PT',{day:'2-digit'}).format(d)}</strong><small>${fmtHours(total)}</small></button>`}).join('')}</div></div>`}
function heatmap(sessions,title){const buckets=Array.from({length:24},(_,h)=>({h,sec:0}));sessions.forEach(s=>buckets[new Date(s.start).getHours()].sec+=s.duration);const max=Math.max(1,...buckets.map(b=>b.sec)),peak=buckets.reduce((a,b)=>b.sec>a.sec?b:a,buckets[0]);return `<div class="goalLine"><div><h3 style="margin:0">${title}</h3><p class="sectionSub">Based on session start time.</p></div><span class="pill">${pad(peak.h)}:00</span></div><div class="heatGrid">${buckets.map(b=>`<div><div class="heatCell" style="background:rgba(134,239,172,${.07+b.sec/max*.72})"></div><small style="color:var(--muted2);font-size:10px">${pad(b.h)}</small></div>`).join('')}</div>`}
function sessionRow(s){return `<div class="session"><div><b>${fmtHours(s.duration)} · ${s.mode}</b><p>${new Intl.DateTimeFormat('pt-PT',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(s.start))}</p></div><button class="btn ghost" onclick="delSession('${s.id}')">Delete</button></div>`}
function addManual(e){e.preventDefault();const start=makeLocalDate($('#manDate').value,...$('#manTime').value.split(':').map(Number)),duration=Math.max(1,+$('#manMin').value)*60;state.sessions.unshift({id:'m'+Date.now(),start:start.toISOString(),duration,mode:'Manual',completed:true});state.selectedDay=localDateKey(start);save();render()} function delSession(id){state.sessions=state.sessions.filter(s=>s.id!==id);save();render()}
function renderProfile(){const bd=bestDay(),bw=bestWeek();$('#profileView').innerHTML=`<div class="card profileHero"><div class="avatar">L</div><div><h2 class="sectionTitle">Study profile</h2><p class="sectionSub">General study tracking · no subjects needed</p><p class="sectionSub" style="margin-top:10px">Goal: protect real focus time. If you leave the app, the session stops counting.</p><div class="profileStats"><div><b>${fmtHours(sum(state.sessions))}</b><span>total studied</span></div><div><b>${streak()}</b><span>day streak</span></div><div><b>${state.dailyGoalMin} min</b><span>daily goal</span></div></div></div></div><div class="grid4"><div class="smallCard"><p>Best day</p><b>${fmtHours(bd[1])}</b><p>${bd[0]}</p></div><div class="smallCard"><p>Best week</p><b>${fmtHours(bw[1])}</b><p>week of ${bw[0]}</p></div><div class="smallCard"><p>Current streak</p><b>${streak()}</b><p>days</p></div><div class="smallCard"><p>Sessions</p><b>${state.sessions.length}</b><p>tracked</p></div></div><div class="card"><h3>Real app notes</h3><p class="sectionSub">This PWA works in the browser and can be installed to your home screen. A native Android app could detect app switching/screen locking more strongly.</p></div>`}
function render(){ $$('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab));$('#timerView').classList.toggle('hidden',state.tab!=='timer');$('#statsView').classList.toggle('hidden',state.tab!=='stats');$('#profileView').classList.toggle('hidden',state.tab!=='profile'); if(state.tab==='timer')renderTimer(); if(state.tab==='stats')renderStats(); if(state.tab==='profile')renderProfile()}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))} render();
</script>
</body></html>
