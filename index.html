ign-items:center;justify-content:center;background:var(--accent);color:#052e16;font-weight:950;border-radius:999px;padding:8px 14px;white-space:nowrap}.progressOuter{height:13px;border-radius:999px;background:#27272a;overflow:hidden;margin-top:22px}.progressInner{height:13px;border-radius:999px;background:var(--accent);transition:.2s ease}.stepper{display:grid;grid-template-columns:64px 1fr 64px;gap:12px;align-items:center;margin:22px 0 6px}.stepBtn{height:64px;border-radius:22px;border:1px solid var(--line);background:#27272a;color:var(--text);font-size:34px;font-weight:900;display:grid;place-items:center}.stepBtn:active{transform:scale(.96)}.valueDisplay{min-height:64px;border-radius:22px;background:var(--accent);color:#052e16;font-weight:950;font-size:24px;display:grid;place-items:center;text-align:center;padding:8px}.timerCircle{width:260px;height:260px;position:relative;margin:12px auto 26px}.timerCircle svg{transform:rotate(-90deg)}.timerCenter{position:absolute;inset:0;display:grid;place-items:center;text-align:center}.leafBubble{width:62px;height:62px;border-radius:999px;background:rgba(134,239,172,.12);display:grid;place-items:center;font-size:30px;margin:0 auto 11px}.time{font-size:43px;font-weight:950;letter-spacing:-1px}.sub{font-size:13px;color:var(--muted)}.modeTabs,.rangeTabs{display:grid;gap:5px;background:#27272a;border-radius:18px;padding:5px}.modeTabs{grid-template-columns:repeat(2,1fr);margin:20px 0 24px}.rangeTabs{grid-template-columns:repeat(3,1fr);margin-top:20px}.modeTabs button,.rangeTabs button{border:0;border-radius:14px;padding:13px 10px;background:transparent;color:var(--muted);font-weight:850}.modeTabs button.active,.rangeTabs button.active{background:var(--accent);color:#052e16}.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:22px}.btn{border:0;border-radius:16px;padding:14px 12px;font-weight:900}.primary{background:var(--accent);color:#052e16}.ghost{background:#27272a;color:#f4f4f5;border:1px solid var(--line)}.btn:disabled{opacity:.45;cursor:not-allowed}.notice{margin-top:22px;background:var(--card3);border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:14px;font-size:14px;line-height:1.5}.okmsg{background:rgba(134,239,172,.10);border:1px solid rgba(134,239,172,.22);color:#bbf7d0;border-radius:20px;padding:14px;font-weight:850;margin-bottom:18px}.periodControl{display:grid;grid-template-columns:52px 1fr 52px;gap:10px;align-items:center;margin-top:16px}.periodBtn{height:52px;border-radius:18px;border:1px solid var(--line);background:#27272a;color:var(--text);font-size:24px;font-weight:900}.periodLabel{background:var(--card2);border:1px solid var(--line);border-radius:18px;min-height:52px;display:grid;place-items:center;text-align:center;padding:8px;color:#d4d4d8;font-weight:850;font-size:14px}.statGrid{display:grid;grid-template-columns:1fr;gap:18px}.metric{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px}.metric span{display:block;color:var(--muted);font-size:14px}.metric b{display:block;font-size:28px;margin-top:6px}.chart{display:flex;gap:10px;align-items:end;height:240px;padding:12px 2px 0;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:auto}.barDay{min-width:54px;flex:0 0 54px;border:0;background:transparent;color:inherit;padding:0;display:flex;flex-direction:column;align-items:center;gap:8px}.range-day .barDay{min-width:100%;flex-basis:100%}.range-week .barDay{min-width:62px;flex-basis:62px}.range-month .barDay{min-width:42px;flex-basis:42px}.barShell{width:100%;height:165px;background:#27272a;border-radius:18px;display:flex;align-items:end;padding:5px}.barFill{width:100%;min-height:6px;border-radius:14px;background:#52525b}.barDay.selected .barShell{outline:2px solid var(--accent);background:rgba(134,239,172,.10)}.barDay.selected .barFill{background:var(--accent)}.barDay strong{font-size:12px;color:#d4d4d8}.barDay small{font-size:10px;color:var(--muted2)}.heat.compact{di const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],pad=n=>String(n).padStart(2,'0');function keyFromDate(x){const d=new Date(x);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function makeDate(k,t='12:00'){const[y,m,d]=k.split('-').map(Number),[h,mi]=t.split(':').map(Number);return new Date(y,m-1,d,h,mi,0,0)}const today=new Date(),todayKey=keyFromDate(today);function weekStart(x){const d=new Date(x),day=d.getDay()||7;d.setDate(d.getDate()-day+1);d.setHours(0,0,0,0);return d}function fmtDur(s){s=Math.max(0,Math.floor(s));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h?`${h}:${pad(m)}:${pad(sec)}`:`${m}:${pad(sec)}`}function fmtHours(s){const h=s/3600;return h<1?`${Math.round(s/60)} min`:`${h.toFixed(1)} h`}function sum(a){return a.reduce((x,s)=>x+s.duration,0)}function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}function addMonths(d,n){const x=new Date(d);x.setMonth(x.getMonth()+n);return x}function weekDays(o=0){const st=weekStart(addDays(today,o*7));return Array.from({length:7},(_,i)=>addDays(st,i))}function monthDays(o=0){const r=addMonths(today,o),y=r.getFullYear(),m=r.getMonth(),n=new Date(y,m+1,0).getDate();return Array.from({length:n},(_,i)=>new Date(y,m,i+1))}
const colors={emerald:['#34d399','#10b981'],blue:['#60a5fa','#3b82f6'],purple:['#a78bfa','#8b5cf6'],pink:['#f472b6','#ec4899'],orange:['#fb923c','#f97316'],yellow:['#facc15','#eab308'],red:['#f87171','#ef4444'],mint:['#5eead4','#14b8a6']};let state=JSON.parse(localStorage.getItem('focusleaf-v5-2-correct')||'null')||{tab:'timer',mode:'countdown',targetMin:60,elapsed:0,running:false,startedAt:null,paused:false,msg:'',dailyGoalMin:120,range:'week',weekOffset:0,monthOffset:0,selectedDay:todayKey,chartScrollLeft:0,profileName:'Student',accent:'emerald',sessions:[]};function applyAccent(){const c=colors[state.accent]||colors.emerald;document.documentElement.style.setProperty('--accent',c[0]);document.documentElement.style.setProperty('--accent2',c[1])}function save(){localStorage.setItem('focusleaf-v5-2-correct',JSON.stringify(state));applyAccent()}applyAccent();function setTab(t){state.tab=t;save();render()}$$('nav button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));function sessionsForKeys(keys){return state.sessions.filter(s=>keys.includes(keyFromDate(s.start)))}function dayMap(){return state.sessions.reduce((m,s)=>{const k=keyFromDate(s.start);m[k]=(m[k]||0)+s.duration;return m},{})}function streak(){const m=dayMap();let st=0,d=new Date(today);while((m[keyFromDate(d)]||0)>=state.dailyGoalMin*60){st++;d.setDate(d.getDate()-1)}return st}function bestDay(){const e=Object.entries(dayMap());return e.length?e.reduce((a,b)=>b[1]>a[1]?b:a,e[0]):['—',0]}function bestWeek(){const m={};state.sessions.forEach(s=>{const k=keyFromDate(weekStart(s.start));m[k]=(m[k]||0)+s.duration});const e=Object.entries(m);return e.length?e.reduce((a,b)=>b[1]>a[1]?b:a,e[0]):['—',0]}function setDailyGoal(v){state.dailyGoalMin=Math.max(15,Math.min(360,v));save();render()}function setTarget(v){state.targetMin=Math.max(0,Math.min(180,v));state.elapsed=0;save();render()}function start(){if(state.mode==='countdown'&&state.targetMin===0)return;if(!state.startedAt)state.startedAt=new Date().toISOString();state.msg='';state.paused=false;state.running=true;save();render()}function pause(){state.running=false;save();render()}function reset(){state.running=false;state.elapsed=0;state.startedAt=null;state.paused=false;save();render()}function saveSession(done=false){if(!state.startedAt||state.elapsed<60)return;state.sessions.unshift({id:'s'+Date.now(),start:state.startedAt,duration:state.elapsed,mode:state.mode==='countdown'?'Countdown':'Stopwatch',completed:done});state.msg=done?'Session completed. Nice work.':'Study time saved.';state.running=false;state.elapsed=0;state.startedAt=null;save();render()}function tick(){if(!state.running)return;state.elapsed++;if(state.mode==='countdown'&&state.targetMin>0&&state.elapsed>=state.targetMin*60){state.elapsed=state.targetMin*60;saveSession(true);return}save();if(state.tab==='timer')renderTimer()}setInterval(tick,1000);document.addEventListener('visibilitychange',()=>{if(document.hidden&&state.running){state.running=false;state.paused=true;save();render()}});window.addEventListener('blur',()=>{if(state.running){state.running=false;state.paused=true;save();render()}});
function summaryStats(){const td=sum(state.sessions.filter(s=>keyFromDate(s.start)===todayKey)),wk=sum(sessionsForKeys(weekDays(0).map(keyFromDate)));return `<div class="stats3"><div class="statBox"><b>${fmtHours(td)}</b><span>today</span></div><div class="statBox"><b>${fmtHours(wk)}</b><span>this week</span></div><div class="statBox"><b>${streak()}</b><span>day streak</span></div></div>`}function stepper(label,value,minus,plus){return `<div><div class="sectionHead"><div><h3>${label}</h3></div><span class="pill">${value} min</span></div><div class="stepper"><button class="stepBtn" onclick="${minus}">−</button><div class="valueDisplay">${value}<br><span style="font-size:13px;font-weight:800">minutes</span></div><button class="stepBtn" onclick="${plus}">+</button></div></div>`}
function renderTimer(){const td=sum(state.sessions.filter(s=>keyFromDate(s.start)===todayKey)),rem=Math.max(0,state.targetMin*60-state.elapsed),disp=state.mode==='countdown'?rem:state.elapsed,prog=state.mode==='countdown'?(state.targetMin?Math.min(1,state.elapsed/(state.targetMin*60)):0):Math.min(1,state.elapsed/Math.max(3600,state.elapsed)),circ=2*Math.PI*113;$('#timerView').innerHTML=`<div class="hero">${summaryStats()}</div><div class="card"><div class="sectionHead"><div><h3>Daily goal</h3><p class="smallText">Progress resets every day. Keep the streak alive.</p></div></div>${stepper('Daily goal',state.dailyGoalMin,'setDailyGoal(state.dailyGoalMin-15)','setDailyGoal(state.dailyGoalMin+15)')}<div class="progressOuter"><div class="progressInner" style="width:${Math.min(100,td/(state.dailyGoalMin*60)*100)}%"></div></div><p class="smallText">Today: ${fmtHours(td)} / ${state.dailyGoalMin} min · Best day: ${fmtHours(bestDay()[1])} · Best week: ${fmtHours(bestWeek()[1])}</p></div><div class="card"><h2 class="title" style="font-size:31px">Study focus timer</h2><p class="subtitle">If you leave the app or lock the phone, the timer pauses.</p><div class="modeTabs"><button class="${state.mode==='countdown'?'active':''}" onclick="state.mode='countdown';reset()">Countdown</button><button class="${state.mode==='stopwatch'?'active':''}" onclick="state.mode='stopwatch';reset()">Stopwatch</button></div><div class="timerCircle"><svg width="260" height="260"><circle cx="130" cy="130" r="113" stroke="#27272a" stroke-width="14" fill="none"></circle><circle cx="130" cy="130" r="113" stroke="var(--accent)" stroke-width="14" fill="none" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ-prog*circ}"></circle></svg><div class="timerCenter"><div><div class="leafBubble">🍃</div><div class="time">${fmtDur(disp)}</div><div class="sub">${state.mode==='countdown'?fmtDur(state.elapsed)+' studied':'elapsed study time'}</div></div></div></div>${state.paused?'<div class="okmsg" style="color:#fde68a;background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.2)">Paused: app not focused</div>':''}${state.msg?`<div class="okmsg">${state.msg}</div>`:''}${state.mode==='countdown'?stepper('Study goal',state.targetMin,'setTarget(state.targetMin-5)','setTarget(state.targetMin+5)'):''}<div class="actions"><button class="btn primary" onclick="start()" ${state.running||(state.mode==='countdown'&&state.targetMin===0)?'disabled':''}>Start</button><button class="btn ghost" onclick="pause()" ${!state.running?'disabled':''}>Pause</button><button class="btn ghost" onclick="saveSession(false)" ${state.elapsed<60?'disabled':''}>Save</button><button class="btn ghost" onclick="reset()">Reset</button></div><div class="notice"><b style="color:var(--text)">Anti-distraction rule</b><br>Leaving the app/browser pauses the timer. This is a PWA; a native Android app could enforce this more strongly.</div></div>`}
function rangeDays(){if(state.range==='day')return[makeDate(state.selectedDay||todayKey)];if(state.range==='week')return weekDays(state.weekOffset);return monthDays(state.monthOffset)}function periodLabel(){if(state.range==='day')return state.selectedDay||todayKey;if(state.range==='week'){const d=weekDays(state.weekOffset);return `${keyFromDate(d[0])} → ${keyFromDate(d[6])}`}const d=monthDays(state.monthOffset)[0];return new Intl.DateTimeFormat('pt-PT',{month:'long',year:'numeric'}).format(d)}function changePeriod(delta){state.chartScrollLeft=0;if(state.range==='week'){state.weekOffset+=delta;const keys=weekDays(state.weekOffset).map(keyFromDate);state.selectedDay=keys.includes(todayKey)?todayKey:keys[0]}else if(state.range==='month'){state.monthOffset+=delta;const keys=monthDays(state.monthOffset).map(keyFromDate);state.selectedDay=keys.includes(todayKey)?todayKey:keys[0]}save();render()}function setRange(r){state.range=r;state.chartScrollLeft=0;if(r==='day')state.selectedDay=todayKey;if(r==='week'){const k=weekDays(state.weekOffset).map(keyFromDate);state.selectedDay=k.includes(todayKey)?todayKey:k[0]}if(r==='month'){const k=monthDays(state.monthOffset).map(keyFromDate);state.selectedDay=k.includes(todayKey)?todayKey:k[0]}save();render()}function selectDay(k){const el=document.getElementById('dayChartScroll');state.chartScrollLeft=el?el.scrollLeft:0;state.selectedDay=k;save();render()}
function renderStats(){const days=rangeDays(),keys=days.map(keyFromDate);if(!keys.includes(state.selectedDay))state.selectedDay=keys.includes(todayKey)?todayKey:keys[0];const filtered=sessionsForKeys(keys),selected=state.sessions.filter(s=>keyFromDate(s.start)===state.selectedDay),total=sum(filtered),selTotal=sum(selected),weekTotal=sum(sessionsForKeys(weekDays(0).map(keyFromDate))),monthTotal=sum(sessionsForKeys(monthDays(0).map(keyFromDate)));$('#statsView').innerHTML=`<div><h2 class="title">Statistics</h2><p class="subtitle">Track study time by day, week and month.</p><div class="rangeTabs"><button class="${state.range==='day'?'active':''}" onclick="setRange('day')">Day</button><button class="${state.range==='week'?'active':''}" onclick="setRange('week')">Week</button><button class="${state.range==='month'?'active':''}" onclick="setRange('month')">Month</button></div>${state.range!=='day'?`<div class="periodControl"><button class="periodBtn" onclick="changePeriod(-1)">‹</button><div class="periodLabel">${periodLabel()}</div><button class="periodBtn" onclick="changePeriod(1)">›</button></div>`:''}</div><div class="statGrid"><div class="metric"><span>Selected range</span><b>${fmtHours(total)}</b></div><div class="metric"><span>Selected day</span><b>${fmtHours(selTotal)}</b></div><div class="metric"><span>This week</span><b>${fmtHours(weekTotal)}</b><span>This month: ${fmtHours(monthTotal)}</span></div></div><div class="card"><div class="sectionHead"><div><h3>Study time by day</h3><p class="smallText">Tap a day to inspect it.</p></div><span class="pill">${state.selectedDay}</span></div>${dayChart(days)}</div><div class="card">${heatmap(selected,'Selected day by hour')}</div><div class="card"><h3>Add manual session</h3><form class="form" onsubmit="addManual(event)"><input id="manDate" type="date" value="${state.selectedDay||todayKey}"><input id="manTime" type="time" value="16:00"><input id="manMin" type="number" min="1" max="720" value="45"><button class="btn primary">Add</button></form></div><div class="card"><h3>Recent sessions for selected day</h3>${selected.length?selected.map(sessionRow).join(''):'<p class="smallText">No sessions this day.</p>'}</div>`;requestAnimationFrame(()=>{const el=document.getElementById('dayChartScroll');if(el)el.scrollLeft=state.chartScrollLeft||0})}
function dayChart(days){const max=Math.max(1,...days.map(d=>sum(state.sessions.filter(s=>keyFromDate(s.start)===keyFromDate(d)))));return `<div id="dayChartScroll" class="chart range-${state.range}">${days.map(d=>{const k=keyFromDate(d),total=sum(state.sessions.filter(s=>keyFromDate(s.start)===k)),h=Math.max(4,total/max*100);return `<button class="barDay ${k===state.selectedDay?'selected':''}" onclick="selectDay('${k}')"><div class="barShell"><div class="barFill" style="height:${h}%"></div></div><strong>${new Intl.DateTimeFormat('pt-PT',{day:'2-digit'}).format(d)}</strong><small>${fmtHours(total)}</small></button>`}).join('')}</div>`}function heatmap(sessions,title){const buckets=Array.from({length:24},(_,h)=>({h,sec:0}));sessions.forEach(s=>buckets[new Date(s.start).getHours()].sec+=s.duration);const max=Math.max(1,...buckets.map(b=>b.sec)),peak=buckets.reduce((a,b)=>b.sec>a.sec?b:a,buckets[0]);return `<div class="sectionHead"><div><h3>${title}</h3><p class="smallText">Based on session start time.</p></div><span class="pill">${pad(peak.h)}:00</span></div><div class="heat compact">${buckets.map(b=>`<div class="heatItem"><div class="heatCell" style="background:rgba(134,239,172,${.07+b.sec/max*.72})"></div><small>${pad(b.h)}</small></div>`).join('')}</div>`}function sessionRow(s){return `<div class="session"><div><b>${fmtHours(s.duration)} · ${s.mode}</b><p>${new Intl.DateTimeFormat('pt-PT',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(s.start))}</p></div><button class="btn ghost" onclick="deleteSession('${s.id}')">Delete</button></div>`}function addManual(e){e.preventDefault();const start=makeDate($('#manDate').value,$('#manTime').value),duration=Math.max(1,+$('#manMin').value)*60;state.sessions.unshift({id:'m'+Date.now(),start:start.toISOString(),duration,mode:'Manual',completed:true});state.selectedDay=keyFromDate(start);save();render()}function deleteSession(id){state.sessions=state.sessions.filter(s=>s.id!==id);save();render()}
function initial(){const n=(state.profileName||'Student').trim();return(n[0]||'S').toUpperCase()}function updateProfileName(v){state.profileName=v||'Student';save();render()}function setAccent(name){state.accent=name;save();render()}function renderProfile(){const bd=bestDay(),bw=bestWeek();$('#profileView').innerHTML=`<div class="card profileHero"><div class="avatar">${initial()}</div><div><h2 class="title">Study profile</h2><p class="subtitle">General study tracking · no subjects needed</p><div class="profileStats"><div><b>${fmtHours(sum(state.sessions))}</b><span>total studied</span></div><div><b>${streak()}</b><span>day streak</span></div><div><b>${state.dailyGoalMin} min</b><span>daily goal</span></div></div></div></div><div class="card"><h3>Edit profile</h3><p class="smallText">Change the name shown on this device.</p><div class="form"><input value="${state.profileName}" oninput="state.profileName=this.value;save();" onblur="render()" placeholder="Your name"></div></div><div class="card"><h3>Accent color</h3><p class="smallText">The dark background stays the same. Only the highlight color changes.</p><div class="colorGrid">${Object.entries(colors).map(([name,c])=>`<button class="colorBtn ${state.accent===name?'active':''}" style="background:${c[0]}" onclick="setAccent('${name}')">${name}</button>`).join('')}</div></div><div class="records"><div class="metric"><span>Best day</span><b>${fmtHours(bd[1])}</b><span>${bd[0]}</span></div><div class="metric"><span>Best week</span><b>${fmtHours(bw[1])}</b><span>week of ${bw[0]}</span></div><div class="metric"><span>Current streak</span><b>${streak()}</b><span>days</span></div><div class="metric"><span>Sessions</span><b>${state.sessions.length}</b><span>tracked</span></div></div>`}
function render(){applyAccent();$$('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab));$('#timerView').classList.toggle('hidden',state.tab!=='timer');$('#statsView').classList.toggle('hidden',state.tab!=='stats');$('#profileView').classList.toggle('hidden',state.tab!=='profile');if(state.tab==='timer')renderTimer();if(state.tab==='stats')renderStats();if(state.tab==='profile')renderProfile()}if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));render();
</script></body></html>
